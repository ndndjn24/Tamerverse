<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THAMERVERSE</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #0a0a0a, #000000);
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  text-align: center;
  max-width: 400px;
  padding: 20px;
}

.title {
  font-size: 34px;
  letter-spacing: 6px;
  margin-bottom: 30px;
  text-transform: uppercase;
}

.subtitle {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  text-align: center;
  margin-bottom: 15px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 2px;
}

button:hover {
  background: #ddd;
}

.image {
  margin-top: 25px;
  width: 100%;
  height: 220px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2);
  filter: contrast(1.2) brightness(0.8);
}
</style>

</head>

<body>

<div class="container">

  <div class="title">THAMERVERSE</div>
  <div class="subtitle">ACCESS IS NOT REQUESTED — IT IS DECIDED</div>

  <input type="text" placeholder="State your name">
  <button>REQUEST ENTRY</button>

  <img class="image" src="image.jpg">

</div>

</body>
</html>
