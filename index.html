<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THAMERVERSE</title>

<style>
body {
  margin: 0;
  padding: 40px;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  letter-spacing: 1px;
  line-height: 1.6;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  align-items: center;
}

/* إزالة أي شكل مربعات */
input, button {
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 16px;
}

/* واجهة الدخول */
.entry {
  display: flex;
  flex-direction: column;
  gap: 10px;
  text-align: center;
}

/* الصورة + النص */
.image-container {
  position: relative;
  width: 300px;
  height: 300px;
}

.image-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  background: rgba(0,0,0,0.3);
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.small {
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

  <!-- الاسم -->
  <div class="title">THAMERVERSE</div>

  <!-- دخول (بدون مربعات) -->
  <div class="entry">
    State your name
    <input type="text">
    Request entry
    <button>ENTER</button>
  </div>

  <!-- الصورة -->
  <div class="image-container">
    <img src="image.jpg">
    <div class="overlay">
      <div class="title">YOU ARE OBSERVED</div>
      <div class="small">THIS ENTRY WAS PREDETERMINED</div>
    </div>
  </div>

</div>

</body>
</html>
